name: Generate Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-catppuccin.svg?color_snake=#a6e3a1&color_dots=#1e1e2e,#313244,#585b70,#cba6f7,#89b4fa

      - name: Generate GitHub stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          output_action: none
          filename: dist/stats.svg
          base: header, repositories, metadata
          config_timezone: Europe/Paris

      - name: Generate top languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          output_action: none
          filename: dist/langs.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          config_timezone: Europe/Paris

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
