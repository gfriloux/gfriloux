  <text x="418" y="206" font-family="'Courier New', Courier, 'DejaVu Sans Mono', monospace" font-size="12" fill="#928374">What breaks. What scales.</text>
  <text x="418" y="223" font-family="'Courier New', Courier, 'DejaVu Sans Mono', monospace" font-size="12" fill="#ebdbb2">Not theory. Experience.</text>
