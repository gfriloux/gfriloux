  <text x="28"  y="108" font-family="'Courier New', Courier, 'DejaVu Sans Mono', monospace" font-size="12"><tspan fill="#8ec07c">Tauri</tspan><tspan fill="#928374"> · </tspan><tspan fill="#8ec07c">Rust</tspan><tspan fill="#928374"> · </tspan><tspan fill="#8ec07c">React</tspan><tspan fill="#928374"> · </tspan><tspan fill="#8ec07c">YubiKey</tspan><tspan fill="#928374"> · </tspan><tspan fill="#8ec07c">MQTT</tspan></text>
