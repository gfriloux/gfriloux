  <rect x="410" y="55" width="370" height="88" fill="none" stroke="#fe8019" stroke-width="1.5"/>
  <line x1="410" y1="74" x2="780" y2="74" stroke="#fe8019" stroke-width="0.5"/>
  <text x="418" y="69" font-family="'Courier New', Courier, 'DejaVu Sans Mono', monospace" font-size="12" fill="#fabd2f">[ botman ]</text>
