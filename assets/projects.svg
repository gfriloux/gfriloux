  <rect x="410" y="153" width="370" height="88" fill="none" stroke="#fe8019" stroke-width="1.5"/>
  <line x1="410" y1="172" x2="780" y2="172" stroke="#fe8019" stroke-width="0.5"/>
  <text x="418" y="167" font-family="'Courier New', Courier, 'DejaVu Sans Mono', monospace" font-size="12" fill="#fabd2f">[ legacy ]</text>
