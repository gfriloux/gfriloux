<svg width="800" height="280" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: 'SFMono-Regular', 'SF Mono', 'Cascadia Code', Consolas, 'Liberation Mono', Menlo, monospace;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="800" height="38" rx="12" fill="#181825"/>
  <rect y="26" width="800" height="12" fill="#181825"/>

  <!-- Window buttons -->
  <circle cx="22" cy="19" r="6" fill="#f38ba8"/>
  <circle cx="42" cy="19" r="6" fill="#f9e2af"/>
  <circle cx="62" cy="19" r="6" fill="#a6e3a1"/>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" font-size="12" fill="#585b70">gfriloux — fish</text>

  <!-- Column separator -->
  <rect x="234" y="46" width="1" height="220" fill="#313244"/>

  <!-- NixOS snowflake ASCII (left column, centered at x=117) -->
  <text x="117" y="68"  text-anchor="middle" font-size="13" fill="#4d8ab5">  \  |  /  </text>
  <text x="117" y="90"  text-anchor="middle" font-size="13" fill="#5c9cc9">   \ | /   </text>
  <text x="117" y="112" text-anchor="middle" font-size="13" fill="#6baad9">    \|/    </text>
  <text x="117" y="134" text-anchor="middle" font-size="14" fill="#7ebae4" font-weight="bold">&#x2500;&#x2500;&#x2500;&#x2500;&#x2500; &#x2744; &#x2500;&#x2500;&#x2500;&#x2500;&#x2500;</text>
  <text x="117" y="156" text-anchor="middle" font-size="13" fill="#6baad9">    /|\    </text>
  <text x="117" y="178" text-anchor="middle" font-size="13" fill="#5c9cc9">   / | \   </text>
  <text x="117" y="200" text-anchor="middle" font-size="13" fill="#4d8ab5">  /  |  \  </text>

  <!-- NixOS label -->
  <text x="117" y="232" text-anchor="middle" font-size="13" fill="#7ebae4" font-weight="bold">&#x2744;  NixOS</text>

  <!-- Right column: neofetch data -->

  <!-- user@host -->
  <text x="260" y="68" font-size="14">
    <tspan fill="#89b4fa" font-weight="bold">gfriloux</tspan><tspan fill="#585b70">@</tspan><tspan fill="#89b4fa" font-weight="bold">github</tspan>
  </text>

  <!-- divider -->
  <text x="260" y="90" font-size="13" fill="#cba6f7">&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;</text>

  <!-- OS -->
  <text x="260" y="112" font-size="13">
    <tspan fill="#cba6f7" font-weight="bold">OS     </tspan><tspan fill="#cdd6f4"> NixOS (unstable)</tspan>
  </text>

  <!-- Shell -->
  <text x="260" y="134" font-size="13">
    <tspan fill="#cba6f7" font-weight="bold">Shell  </tspan><tspan fill="#cdd6f4"> fish</tspan>
  </text>

  <!-- Languages -->
  <text x="260" y="156" font-size="13">
    <tspan fill="#cba6f7" font-weight="bold">Lang   </tspan><tspan fill="#a6e3a1"> C</tspan><tspan fill="#585b70"> · </tspan><tspan fill="#fab387">Rust</tspan><tspan fill="#585b70"> · </tspan><tspan fill="#7ebae4">Nix</tspan>
  </text>

  <!-- Infra -->
  <text x="260" y="178" font-size="13">
    <tspan fill="#cba6f7" font-weight="bold">Infra  </tspan><tspan fill="#cdd6f4"> AWS · Terraform · Ansible</tspan>
  </text>

  <!-- Uptime -->
  <text x="260" y="200" font-size="13">
    <tspan fill="#cba6f7" font-weight="bold">Uptime </tspan><tspan fill="#cdd6f4"> 25+ years on Linux</tspan>
  </text>

  <!-- From -->
  <text x="260" y="222" font-size="13">
    <tspan fill="#cba6f7" font-weight="bold">From   </tspan><tspan fill="#cdd6f4"> Landes, France</tspan>
  </text>

  <!-- Catppuccin color palette -->
  <circle cx="260" cy="253" r="7" fill="#f38ba8"/>
  <circle cx="282" cy="253" r="7" fill="#fab387"/>
  <circle cx="304" cy="253" r="7" fill="#f9e2af"/>
  <circle cx="326" cy="253" r="7" fill="#a6e3a1"/>
  <circle cx="348" cy="253" r="7" fill="#94e2d5"/>
  <circle cx="370" cy="253" r="7" fill="#89b4fa"/>
  <circle cx="392" cy="253" r="7" fill="#cba6f7"/>
  <circle cx="414" cy="253" r="7" fill="#f5c2e7"/>
</svg>
